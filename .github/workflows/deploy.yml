# This app is deployed via Vercel (automatic on push to main).
# This workflow validates that the build succeeds on every PR/push —
# it does NOT deploy to GitHub Pages.

name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Use dummy values for build-time env vars.
          # Real secrets are set in Vercel — not here.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key
        run: npm run build

      - name: Lint
        run: npm run lint
